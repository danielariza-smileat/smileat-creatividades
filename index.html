<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creatividades de la semana — Smileat</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue:      #29ABE2;
  --blue-dark: #0D7BB5;
  --blue-pale: #E8F6FD;
  --blue-mid:  #B3DFF5;
  --green:     #8CC63F;
  --green-dark:#5A8A1A;
  --green-pale:#EEF7E0;
  --red:       #E8413B;
  --red-dark:  #A8201A;
  --red-pale:  #FDECEA;
  --yellow:    #FFC20E;
  --orange:    #F7941D;
  --gray-bg:   #F4F8FB;
  --gray-100:  #E8EFF4;
  --gray-200:  #C8D5DF;
  --gray-500:  #7A9AAD;
  --gray-700:  #3A5566;
  --gray-900:  #1A2E38;
  --font: 'Nunito', 'Futura', 'Century Gothic', sans-serif;
  --radius-bubble: 20px 20px 20px 4px;
}

body {
  font-family: var(--font);
  background: var(--gray-bg);
  color: var(--gray-900);
  padding-bottom: 3rem;
}

/* ── HEADER ── */
.hdr {
  background: var(--blue);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 20;
}

/* Smileat logo bubble */
.logo {
  display: inline-flex;
  align-items: center;
  background: #fff;
  border-radius: 14px 14px 14px 3px;
  padding: 5px 14px 5px 12px;
  gap: 0;
}
.logo span {
  font-size: 18px;
  font-weight: 800;
  color: var(--blue);
  letter-spacing: -0.02em;
  text-transform: uppercase;
}
.logo-sub {
  font-size: 11px;
  font-weight: 600;
  color: var(--blue-dark);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.8;
  margin-left: 8px;
  border-left: 1.5px solid var(--blue-mid);
  padding-left: 8px;
}

/* week nav */
.wnav {
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 10px;
  padding: 4px 6px;
}
.wnav button {
  background: rgba(255,255,255,0.2);
  border: none;
  border-radius: 7px;
  width: 28px; height: 28px;
  cursor: pointer;
  font-size: 14px;
  color: #fff;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.wnav button:hover:not(:disabled) { background: rgba(255,255,255,0.35); }
.wnav button:disabled { opacity: 0.3; cursor: default; }
.wnav .wlabel {
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  min-width: 155px;
  text-align: center;
  padding: 0 4px;
}

/* ── MAIN ── */
.main { max-width: 1120px; margin: 0 auto; padding: 1.75rem 1.5rem; }

/* ── SUMMARY BAR ── */
.summary {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 2rem;
}
.scard {
  background: #fff;
  border-radius: 16px;
  padding: 14px 16px;
  border-bottom: 3px solid var(--blue);
  position: relative;
  overflow: hidden;
}
.scard::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 50px; height: 50px;
  background: var(--blue-pale);
  border-radius: 0 16px 0 50px;
}
.scard .lbl {
  font-size: 10px;
  font-weight: 700;
  color: var(--blue-dark);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 5px;
}
.scard .val {
  font-size: 22px;
  font-weight: 800;
  color: var(--gray-900);
  letter-spacing: -0.02em;
}

/* ── SECTION HEADER ── */
.sec-hdr {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.25rem;
}

/* Bubble badge — Smileat style */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: .05em;
  text-transform: uppercase;
  padding: 6px 16px 6px 12px;
  border-radius: 12px 12px 12px 3px;
}
.badge.top    { background: var(--green); color: #fff; }
.badge.bottom { background: var(--red);   color: #fff; }
.sec-sub { font-size: 12px; font-weight: 600; color: var(--gray-500); }

.divider {
  height: 2px;
  background: linear-gradient(to right, var(--blue-mid), transparent);
  margin: 2rem 0;
  border-radius: 2px;
}

/* ── CARD GRID — always 3 cols ── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* ── CARD ── */
.card {
  background: #fff;
  border-radius: 18px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 2px 8px rgba(41,171,226,0.08);
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(41,171,226,0.15);
}
.card.top    { border-top: 4px solid var(--green); }
.card.bottom { border-top: 4px solid var(--red); }

/* PREVIEW */
.preview-wrap {
  position: relative;
  width: 100%;
  padding-top: 100%;
  background: var(--gray-bg);
  overflow: hidden;
}
.preview-wrap iframe {
  position: absolute;
  top: 50%; left: 50%;
  width: 320px; height: 525px;
  border: none;
  pointer-events: none;
}

/* rank bubble */
.rank {
  position: absolute;
  top: 10px; left: 10px;
  z-index: 2;
  width: 30px; height: 30px;
  border-radius: 50% 50% 50% 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  color: #fff;
}
.rank.top    { background: var(--green); }
.rank.bottom { background: var(--red); }

.type-tag {
  position: absolute;
  top: 10px; right: 10px;
  z-index: 2;
  background: rgba(26,46,56,0.65);
  backdrop-filter: blur(4px);
  color: #fff;
  font-size: 9px;
  font-weight: 800;
  letter-spacing: .07em;
  padding: 3px 8px;
  border-radius: 6px;
  text-transform: uppercase;
}

/* CARD BODY */
.cbody {
  padding: 14px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.ad-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--gray-900);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.ad-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.meta-date {
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-500);
}
.days-pill {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 20px;
  background: var(--blue-pale);
  color: var(--blue-dark);
}

/* metrics 2x2 */
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.m {
  border-radius: 10px;
  padding: 8px 10px;
  background: var(--gray-bg);
  border: 1.5px solid var(--gray-100);
}
.m-lbl {
  font-size: 9px;
  font-weight: 700;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 2px;
}
.m-val {
  font-size: 14px;
  font-weight: 800;
  color: var(--gray-900);
}
.m-val.g { color: var(--green-dark); }
.m-val.r { color: var(--red-dark); }

/* ── FOOTER ── */
.footer {
  text-align: center;
  margin-top: 2.5rem;
  font-size: 11px;
  font-weight: 600;
  color: var(--gray-500);
  letter-spacing: .03em;
}
</style>
</head>
<body>

<header class="hdr">
  <div class="logo">
    <span>SMILEAT</span>

  </div>
  <div class="wnav">
    <button id="bprev">&#8592;</button>
    <div class="wlabel" id="wlabel">—</div>
    <button id="bnext" disabled>&#8594;</button>

<main class="main" id="main"></main>

<footer class="footer">Meta Ads · Cuenta 1376434332643791 · Ordenado por purchases · Smileat 2026</footer>

      { name:"IMG 2 - 25% Descuento junio 2026",                           created:"2026-06-19", spend:938.92,  purchases:142, ctr:0.92, cpa:6.61,  type:"IMG",
        iframe:"https://business.facebook.com/ads/api/preview_iframe.php?d=AQK_zFHUnr2kVA0tZSVZVfOt-TTfatIMAHvad-0AGEuYZ13RvreRcKEG2WAXo0m51K783QXi8k2YPsjHk4Ta6QIkLLDbNcF3F6Bv-e66bMfPp8De9AOHPwYZ6wptqpuUC5CGCqxmyBNol-2pwEOC4BPLiFr8OxgnQPRL7Q2XlckXbHLXue-3RA5ySXIrAC2IEuRPlABoNaAkgTtOrYm8C59G&t=AQJeyHYDRmRxcD0hG3w" },
      { name:"VID_Dudas Tarritos - Copia",                                 created:"2026-06-11", spend:2026.30, purchases:81,  ctr:2.45, cpa:25.02, type:"VID", iframe:null },
      { name:"VID - Suscripción Hook 1 \"Sabias que puedes tener\"",       created:"2026-04-13", spend:670.02,  purchases:81,  ctr:1.07, cpa:8.27,  type:"VID", iframe:null },

      { name:"VID_Paid_Partnership_Juan Llorca_Gazpachito",               created:"2026-06-22", spend:71.76,   purchases:2,   ctr:2.28, cpa:35.88, type:"VID", iframe:null },
      { name:"VID - Suscripción Hook 2 \"Si tienes un bebé...\"",         created:"2026-04-13", spend:31.86,   purchases:2,   ctr:1.07, cpa:15.93, type:"VID",
        iframe:"https://business.facebook.com/ads/api/preview_iframe.php?d=AQJTfadXZDQQYkUW8bW3OdDiiMOEQ5NZfmc0Qu2RCyie6GxRFQrKl3fxduStq2ticDK13EYu2M3Z0uJSrsnAS4R4nEa_mbXsh4wAWn8dbXtllmoiVjBQklW7PbPDJfmwdUCF4yycc_EgjIlcGfZ8mK1cOxarcqp1H5RIln3ce4O3idihG53PGinruVIhVzcb9_RezT_1lD3DO839aq1K6T8m&t=AQJjKwbONGHRJ69d7iY" },
      { name:"IMA_Comparativa platitos - macarrones - Copia",             created:"2026-06-11", spend:4.16,    purchases:1,   ctr:1.80, cpa:4.16,  type:"IMG",
        iframe:"https://business.facebook.com/ads/api/preview_iframe.php?d=AQJRYS7V1lCiK-BbzusbqcymMQ1-acHujrMGCAz5vAz3tcrGzuNbO4xTFAIJIfZkEpfKQsvchOpbZhcSPNl513pQqIkxs04BblxElyNOY9gV3khUkkdG1o_zU10GZ9_RQCogUubKJ8987MO3rR7exzMs5MnnDoF94z-te080ZK0vyM_zLW5jHmL3dsaglugU98SDiVcutyN99A0qlzHlf3ed&t=AQIeP5-hd8Z-0TpPN6w" }
    ]
  }
};

const KEYS = Object.keys(WEEKS).sort().reverse();
let idx = 0;

function pd(s) { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmtWeek(k) {
  const mon=pd(k), sun=new Date(mon); sun.setDate(mon.getDate()+6);
  const f=d=>d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});
  return `${f(mon)} – ${f(sun)} · ${mon.getFullYear()}`;
}
function days(s) { return Math.round((new Date(2026,5,24)-pd(s))/86400000); }
function tlabel(n) {
  const u=(n||'').toUpperCase();
  if(u.startsWith('VID')) return 'VIDEO';
  if(u.startsWith('IMG')||u.startsWith('IMA')) return 'IMAGEN';
  if(u.startsWith('CARR')) return 'CARRUSEL';
  return '';
}

function noPreview() {
  return `<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:#EEF6FB;">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#7A9AAD" stroke-width="1.5" opacity=".5">
      <rect x="3" y="3" width="18" height="18" rx="3"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <span style="font-size:11px;font-weight:700;color:#7A9AAD;letter-spacing:.03em;">Sin preview</span>
  </div>`;
}

function card(ad, cls, rank) {
  const d = days(ad.created);
  const created = pd(ad.created).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
  const spend = `€${ad.spend.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const cpa   = ad.cpa>0 ? `€${ad.cpa.toFixed(2)}` : '—';
  const ctr   = `${ad.ctr.toFixed(2)}%`;
  const lbl   = tlabel(ad.name);
  const avgCpa = 7.59;
  const cc = ad.cpa>0&&ad.cpa<=avgCpa*0.7?'g':ad.cpa>avgCpa*1.4?'r':'';

  const media = ad.iframe
    ? `<iframe src="${ad.iframe}" scrolling="no" allow="autoplay" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>`
    : noPreview();

  return `
<div class="card ${cls}">
  <div class="preview-wrap" data-id="${rank}">
    ${media}
    <span class="rank ${cls}">${rank}</span>
    ${lbl?`<span class="type-tag">${lbl}</span>`:''}
  </div>
  <div class="cbody">
    <p class="ad-name" title="${ad.name}">${ad.name}</p>
    <div class="ad-meta">
      <span class="meta-date">📅 ${created}</span>
      <span class="days-pill">${d}d activo</span>
    </div>
    <div class="metrics">
      <div class="m"><div class="m-lbl">Ad Spend</div><div class="m-val">${spend}</div></div>
      <div class="m"><div class="m-lbl">Purchases</div><div class="m-val">${ad.purchases}</div></div>
      <div class="m"><div class="m-lbl">CPA</div><div class="m-val ${cc}">${cpa}</div></div>
      <div class="m"><div class="m-lbl">CTR</div><div class="m-val">${ctr}</div></div>
    </div>
  </div>
</div>`;
}

function scaleIframes() {
  document.querySelectorAll('.preview-wrap').forEach(w => {
    const W = w.offsetWidth; if(!W) return;
    const sc = W/320;
    const fr = w.querySelector('iframe');
    if(fr) fr.style.transform = `translate(-50%,-50%) scale(${sc})`;
  });
}

function render() {
  const key = KEYS[idx];
  document.getElementById('wlabel').textContent = fmtWeek(key);
  document.getElementById('bprev').disabled = idx >= KEYS.length-1;
  document.getElementById('bnext').disabled = idx <= 0;

  const w = WEEKS[key];
  if(!w){ document.getElementById('main').innerHTML='<p style="padding:3rem;text-align:center">Sin datos.</p>'; return; }

  const sorted = [...w.ads].filter(a=>a.spend>0).sort((a,b)=>b.purchases-a.purchases);
  const top3  = sorted.slice(0,3);
  const bot3  = sorted.length>=6 ? sorted.slice(-3).reverse() : sorted.slice(-Math.min(3,sorted.length)).reverse();

  const ts = w.ads.reduce((s,a)=>s+a.spend,0);
  const tp = w.ads.reduce((s,a)=>s+a.purchases,0);
  const avgCpa = tp>0?(ts/tp).toFixed(2):'—';
  const active = w.ads.filter(a=>a.spend>0).length;

  document.getElementById('main').innerHTML = `
    <div class="summary">
      <div class="scard"><div class="lbl">Total spend</div><div class="val">€${ts.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})}</div></div>
      <div class="scard"><div class="lbl">Total purchases</div><div class="val">${tp}</div></div>
      <div class="scard"><div class="lbl">CPA medio</div><div class="val">€${avgCpa}</div></div>
      <div class="scard"><div class="lbl">Creatividades activas</div><div class="val">${active}</div></div>
    </div>

    <div class="sec-hdr">
      <span class="badge top">🏆 Top 3</span>
      <span class="sec-sub">Mayor volumen de purchases</span>
    </div>
    <div class="grid">${top3.map((a,i)=>card(a,'top',i+1)).join('')}</div>

    <div class="divider"></div>

    <div class="sec-hdr">
      <span class="badge bottom">⚠️ Bottom 3</span>
      <span class="sec-sub">Menor volumen de purchases</span>
    </div>
    <div class="grid">${bot3.map((a,i)=>card(a,'bottom',i+1)).join('')}</div>`;

  requestAnimationFrame(()=>requestAnimationFrame(scaleIframes));
}

document.getElementById('bprev').addEventListener('click',()=>{if(idx<KEYS.length-1){idx++;render();}});
document.getElementById('bnext').addEventListener('click',()=>{if(idx>0){idx--;render();}});
window.addEventListener('resize', scaleIframes);
render();
</script>
</body>
