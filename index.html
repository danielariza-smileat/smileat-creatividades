<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creatividades de la semana — Smileat</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#29ABE2;--blue-dark:#0D7BB5;--blue-pale:#E8F6FD;
  --green:#8CC63F;--green-dark:#5A8A1A;--green-pale:#EEF7E0;
  --red:#E8413B;--red-dark:#A8201A;--red-pale:#FDECEA;
  --orange:#F7941D;
  --gray-bg:#F4F8FB;--gray-100:#E8EFF4;--gray-500:#7A9AAD;--gray-700:#3A5566;--gray-900:#1A2E38;
  --font:'Nunito','Century Gothic',sans-serif;
}
body{font-family:var(--font);background:var(--gray-bg);color:var(--gray-900);padding-bottom:3rem}

/* HEADER */
.hdr{background:var(--blue);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:inline-flex;align-items:center;background:#fff;border-radius:14px 14px 14px 3px;padding:5px 14px 5px 12px}
.logo span{font-size:18px;font-weight:800;color:var(--blue);letter-spacing:-.02em;text-transform:uppercase}
.logo-sub{font-size:11px;font-weight:700;color:var(--blue-dark);letter-spacing:.1em;text-transform:uppercase;margin-left:8px;border-left:1.5px solid #B3DFF5;padding-left:8px}
.wnav{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border-radius:10px;padding:4px 6px}
.wnav button{background:rgba(255,255,255,.2);border:none;border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:14px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center}
.wnav button:hover:not(:disabled){background:rgba(255,255,255,.35)}
.wnav button:disabled{opacity:.3;cursor:default}
.wnav .wlabel{font-size:13px;font-weight:700;color:#fff;min-width:155px;text-align:center;padding:0 4px}

/* MAIN */
.main{max-width:1280px;margin:0 auto;padding:1.75rem 1.5rem}

/* SUMMARY */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2rem}
.scard{background:#fff;border-radius:14px;padding:12px 16px;border-bottom:3px solid var(--blue)}
.scard .lbl{font-size:10px;font-weight:700;color:var(--blue-dark);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.scard .val{font-size:20px;font-weight:800;letter-spacing:-.02em}
.scard .wow{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;margin-top:5px;padding:2px 8px;border-radius:20px}
.scard .wow.up{background:var(--green-pale);color:var(--green-dark)}
.scard .wow.down{background:var(--red-pale);color:var(--red-dark)}
.scard .wow.flat{background:var(--gray-100);color:var(--gray-500)}
/* for CPA: lower is better */
.scard .wow.good{background:var(--green-pale);color:var(--green-dark)}
.scard .wow.bad{background:var(--red-pale);color:var(--red-dark)}

/* SECTION */
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:5px 14px 5px 10px;border-radius:10px 10px 10px 3px}
.badge.top-v{background:var(--green);color:#fff}
.badge.top-i{background:var(--blue);color:#fff}
.badge.bot-v{background:var(--red);color:#fff}
.badge.bot-i{background:var(--orange);color:#fff}
.sec-sub{font-size:12px;font-weight:600;color:var(--gray-500)}
.divider{height:2px;background:linear-gradient(to right,#B3DFF5,transparent);margin:1.75rem 0;border-radius:2px}

/* GRID 5 */
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:.5rem}

/* CARD */
.card{background:#fff;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:transform .18s,box-shadow .18s;box-shadow:0 2px 6px rgba(41,171,226,.08)}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(41,171,226,.18)}
.card.top-v,.card.top-i{border-top:3px solid var(--green)}
.card.top-i{border-top-color:var(--blue)}
.card.bot-v{border-top:3px solid var(--red)}
.card.bot-i{border-top:3px solid var(--orange)}

/* PREVIEW */
.preview-wrap{position:relative;width:100%;overflow:hidden;background:var(--gray-bg)}
.preview-wrap.vid{padding-top:177.78%}
.preview-wrap.img{padding-top:100%}
.preview-wrap iframe{position:absolute;top:50%;left:50%;width:320px;height:525px;border:none;pointer-events:none}
.no-prev{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#EEF6FB}
.no-prev span{font-size:10px;font-weight:700;color:var(--gray-500)}
.rank{position:absolute;top:7px;left:7px;z-index:2;width:24px;height:24px;border-radius:50% 50% 50% 6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
.rank.top-v,.rank.top-i{background:var(--green)}
.rank.top-i{background:var(--blue)}
.rank.bot-v{background:var(--red)}
.rank.bot-i{background:var(--orange)}
.type-tag{position:absolute;top:7px;right:7px;z-index:2;background:rgba(26,46,56,.6);color:#fff;font-size:8px;font-weight:800;letter-spacing:.07em;padding:2px 6px;border-radius:5px;text-transform:uppercase}

/* CARD BODY */
.cbody{padding:10px;flex:1;display:flex;flex-direction:column;gap:7px}
.ad-name{font-size:11px;font-weight:700;color:var(--gray-900);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ad-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.meta-date{font-size:10px;font-weight:600;color:var(--gray-500)}
.days-pill{font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;background:var(--blue-pale);color:var(--blue-dark)}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.m{border-radius:8px;padding:6px 8px;background:var(--gray-bg);border:1.5px solid var(--gray-100)}
.m-lbl{font-size:8px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1px}
.m-val{font-size:12px;font-weight:800;color:var(--gray-900)}
.m-val.g{color:var(--green-dark)}
.m-val.r{color:var(--red-dark)}

/* ADS MANAGER LINK */
.am-link{display:flex;align-items:center;justify-content:center;gap:4px;font-size:9px;font-weight:700;color:var(--gray-500);text-decoration:none;padding:4px 0 2px;letter-spacing:.03em;border-top:1px solid var(--gray-100);margin-top:auto}
.am-link:hover{color:var(--blue)}
.am-link svg{flex-shrink:0}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(13,30,40,.75);align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px;display:flex;overflow:hidden;max-height:90vh;width:100%;max-width:860px;position:relative}
.modal-media{flex-shrink:0;background:#1A2E38;display:flex;align-items:center;justify-content:center}
.modal-media.vid{width:320px}
.modal-media.img{width:420px}
.modal-media iframe{display:block;border:none;pointer-events:auto}
.modal-media.vid iframe{width:320px;height:568px}
.modal-media.img iframe{width:420px;height:420px}
.modal-no-prev{width:100%;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--gray-500);font-size:12px;font-weight:700}
.modal-info{flex:1;padding:1.5rem;overflow-y:auto;display:flex;flex-direction:column;gap:1rem;min-width:0}
.modal-close{position:absolute;top:14px;right:14px;z-index:10;background:var(--gray-100);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--gray-700)}
.modal-close:hover{color:var(--gray-900)}
.modal-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:4px 12px;border-radius:8px 8px 8px 2px}
.modal-title{font-size:15px;font-weight:800;color:var(--gray-900);line-height:1.4}
.modal-date{font-size:12px;font-weight:600;color:var(--gray-500)}
.modal-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-m{background:var(--gray-bg);border:1.5px solid var(--gray-100);border-radius:10px;padding:10px 12px}
.modal-m .lbl{font-size:10px;font-weight:700;color:var(--gray-500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.modal-m .val{font-size:20px;font-weight:800;color:var(--gray-900)}
.modal-m .val.g{color:var(--green-dark)}
.modal-m .val.r{color:var(--red-dark)}
.modal-am{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--blue);text-decoration:none;padding:8px 14px;border-radius:8px;border:1.5px solid var(--blue-pale);background:var(--blue-pale);margin-top:.5rem}
.modal-am:hover{background:#d0ecf9}

.footer{text-align:center;margin-top:2.5rem;font-size:11px;font-weight:600;color:var(--gray-500)}
</style>
</head>

const KEYS = Object.keys(WEEKS).sort().reverse();
let idx = 0, currentAds = [];

function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmtWeek(k){
  const mon=pd(k),sun=new Date(mon);sun.setDate(mon.getDate()+6);
  const f=d=>d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});
  return `${f(mon)} – ${f(sun)} · ${mon.getFullYear()}`;
}
function days(s){return Math.round((new Date(2026,5,24)-pd(s))/86400000);}

function wowBadge(curr, prev, lowerIsBetter=false) {
  if(prev==null||prev===0) return '';
  const pct = ((curr-prev)/prev)*100;
  const abs = Math.abs(pct).toFixed(1);
  if(Math.abs(pct)<1) return `<span class="wow flat">→ ${abs}%</span>`;
  const better = lowerIsBetter ? pct<0 : pct>0;
  const cls = better ? 'up' : 'down';
  const arrow = pct>0 ? '↑' : '↓';
  return `<span class="wow ${cls}">${arrow} ${abs}%</span>`;
}

function summaryStats(ads){
  const ts=ads.reduce((s,a)=>s+a.spend,0);
  const tp=ads.reduce((s,a)=>s+a.purchases,0);
  const cpa=tp>0?ts/tp:0;
  const active=ads.filter(a=>a.spend>0).length;
  return{spend:ts,purchases:tp,cpa,active};
}

function noPreviewHTML(){
  return`<div class="no-prev"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#7A9AAD" stroke-width="1.5" opacity=".4"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>Sin preview</span></div>`;
}

function amLink(id, stopPropagation=false){
  const url=`${AM_BASE}${id}`;
  const stop=stopPropagation?'onclick="event.stopPropagation()"':'';
  return`<a href="${url}" target="_blank" rel="noopener" class="am-link" ${stop}>
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    Ver en Ads Manager
  </a>`;
}

function card(ad,cls,rank,gIdx){
  const isVid=ad.type==='VID';
  const d=days(ad.created);
  const cr=pd(ad.created).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
  const spend=`€${ad.spend.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const cpa=ad.cpa>0?`€${ad.cpa.toFixed(2)}`:'—';
  const ctr=`${ad.ctr.toFixed(2)}%`;
  const avgCpa=8;
  const cc=ad.cpa>0&&ad.cpa<=avgCpa*0.7?'g':ad.cpa>avgCpa*1.4?'r':'';
  const media=ad.iframe
    ?`<iframe src="${ad.iframe}" scrolling="no" allow="autoplay" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>`
    :noPreviewHTML();
  return`<div class="card ${cls}" onclick="openModal(${gIdx})">
  <div class="preview-wrap ${isVid?'vid':'img'}">${media}<span class="rank ${cls}">${rank}</span><span class="type-tag">${ad.type}</span></div>
  <div class="cbody">
    <p class="ad-name" title="${ad.name}">${ad.name}</p>
    <div class="ad-meta"><span class="meta-date">${cr}</span><span class="days-pill">${d}d</span></div>
    <div class="metrics">
      <div class="m"><div class="m-lbl">Spend</div><div class="m-val">${spend}</div></div>
      <div class="m"><div class="m-lbl">Purchases</div><div class="m-val">${ad.purchases}</div></div>
      <div class="m"><div class="m-lbl">CPA</div><div class="m-val ${cc}">${cpa}</div></div>
      <div class="m"><div class="m-lbl">CTR</div><div class="m-val">${ctr}</div></div>
    </div>
    ${amLink(ad.id, true)}
  </div>
</div>`;
}

function section(ads,allAds,cls,emoji,label,sub){
  if(!ads.length) return '';
  return`<div class="sec-hdr"><span class="badge ${cls}">${emoji} ${label}</span><span class="sec-sub">${sub}</span></div>
<div class="grid5">${ads.map((a,i)=>card(a,cls,i+1,allAds.indexOf(a))).join('')}</div>`;
}

function render(){
  const key=KEYS[idx];
  document.getElementById('wlabel').textContent=fmtWeek(key);
  document.getElementById('bprev').disabled=idx>=KEYS.length-1;
  document.getElementById('bnext').disabled=idx<=0;

  const ads=WEEKS[key]||[];
  currentAds=ads;
  const prevKey=KEYS[idx+1];
  const prevAds=prevKey?WEEKS[prevKey]:null;

  const curr=summaryStats(ads);
  const prev=prevAds?summaryStats(prevAds):null;

  const fmt=(v,dec=2)=>`€${v.toLocaleString('es-ES',{minimumFractionDigits:dec,maximumFractionDigits:dec})}`;

  document.getElementById('main').innerHTML=`
    <div class="summary">
      <div class="scard">
        <div class="lbl">Total spend</div>
        <div class="val">${fmt(curr.spend)}</div>
        ${prev?wowBadge(curr.spend,prev.spend):''}
      </div>
      <div class="scard">
        <div class="lbl">Total purchases</div>
        <div class="val">${curr.purchases}</div>
        ${prev?wowBadge(curr.purchases,prev.purchases):''}
      </div>
      <div class="scard">
        <div class="lbl">CPA medio</div>
        <div class="val">${curr.cpa>0?fmt(curr.cpa):'—'}</div>
        ${prev&&prev.cpa>0?wowBadge(curr.cpa,prev.cpa,true):''}
      </div>
      <div class="scard">
        <div class="lbl">Creatividades activas</div>
        <div class="val">${curr.active}</div>
        ${prev?wowBadge(curr.active,prev.active):''}
      </div>
    </div>
    ${(()=>{
      const vids=ads.filter(a=>a.type==='VID').sort((a,b)=>b.purchases-a.purchases);
      const imgs=ads.filter(a=>a.type==='IMG'||a.type==='IMA').sort((a,b)=>b.purchases-a.purchases);
      const topV=vids.slice(0,5), botV=vids.length>5?[...vids].slice(-5).reverse():[];
      const topI=imgs.slice(0,5), botI=imgs.length>5?[...imgs].slice(-5).reverse():[];
      return[
        section(topV,ads,'top-v','🏆','Top 5 Video','Mayor purchases'),
        '<div class="divider"></div>',
        section(topI,ads,'top-i','🏆','Top 5 Imagen','Mayor purchases'),
        botV.length?'<div class="divider"></div>'+section(botV,ads,'bot-v','⚠️','Bottom 5 Video','Menor purchases'):'',
        botI.length?'<div class="divider"></div>'+section(botI,ads,'bot-i','⚠️','Bottom 5 Imagen','Menor purchases'):''
      ].join('');
    })()}
  `;
  requestAnimationFrame(()=>requestAnimationFrame(scaleIframes));
}

function scaleIframes(){
  document.querySelectorAll('.preview-wrap').forEach(w=>{
    const W=w.offsetWidth;if(!W)return;
    const fr=w.querySelector('iframe');
    if(fr)fr.style.transform=`translate(-50%,-50%) scale(${W/320})`;
  });
}

function openModal(i){
  const ad=currentAds[i];if(!ad)return;
  const isVid=ad.type==='VID';
  const d=days(ad.created);
  const cr=pd(ad.created).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
  const spend=`€${ad.spend.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const cpa=ad.cpa>0?`€${ad.cpa.toFixed(2)}`:'—';
  const ctr=`${ad.ctr.toFixed(2)}%`;
  const avgCpa=8;
  const cc=ad.cpa>0&&ad.cpa<=avgCpa*0.7?'g':ad.cpa>avgCpa*1.4?'r':'';
  const mm=document.getElementById('modal-media');
  mm.className=`modal-media ${isVid?'vid':'img'}`;
  mm.innerHTML=ad.iframe
    ?`<iframe src="${ad.iframe}" scrolling="yes" allow="autoplay" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>`
    :`<div class="modal-no-prev"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#7A9AAD" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>Sin preview disponible</span></div>`;
  document.getElementById('modal-info').innerHTML=`
    <div><span class="modal-badge" style="background:${isVid?'#29ABE2':'#8CC63F'};color:#fff">${ad.type} · ${d}d activo</span></div>
    <p class="modal-title">${ad.name}</p>
    <p class="modal-date">📅 Creado: ${cr}</p>
    <div class="modal-metrics">
      <div class="modal-m"><div class="lbl">Ad Spend</div><div class="val">${spend}</div></div>
      <div class="modal-m"><div class="lbl">Purchases</div><div class="val">${ad.purchases}</div></div>
      <div class="modal-m"><div class="lbl">CPA</div><div class="val ${cc}">${cpa}</div></div>
      <div class="modal-m"><div class="lbl">CTR</div><div class="val">${ctr}</div></div>
    </div>
    <a href="${AM_BASE}${ad.id}" target="_blank" rel="noopener" class="modal-am">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Ver en Ads Manager
    </a>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  const fr=document.querySelector('#modal-media iframe');
  if(fr){const s=fr.src;fr.src='';fr.src=s;}
}

document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
document.getElementById('bprev').addEventListener('click',()=>{if(idx<KEYS.length-1){idx++;render();}});
document.getElementById('bnext').addEventListener('click',()=>{if(idx>0){idx--;render();}});
window.addEventListener('resize',scaleIframes);
render();
</script>
