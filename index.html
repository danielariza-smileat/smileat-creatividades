<title>Creatividades — Smileat</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#29ABE2;--blue-dark:#0D7BB5;--blue-pale:#E8F6FD;
  --green:#8CC63F;--green-dark:#5A8A1A;--green-pale:#EEF7E0;
  --red:#E8413B;--red-dark:#A8201A;--red-pale:#FDECEA;
  --orange:#F7941D;
  --bg:#F4F8FB;--g100:#E8EFF4;--g500:#7A9AAD;--g700:#3A5566;--g900:#1A2E38;
  --font:'Nunito','Century Gothic',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--g900);padding-bottom:3rem}
.hdr{background:var(--blue);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{display:inline-flex;align-items:center;background:#fff;border-radius:14px 14px 14px 3px;padding:5px 14px 5px 12px}
.logo span{font-size:18px;font-weight:800;color:var(--blue);letter-spacing:-.02em;text-transform:uppercase}
.logo-sub{font-size:11px;font-weight:700;color:var(--blue-dark);letter-spacing:.1em;text-transform:uppercase;margin-left:8px;border-left:1.5px solid #B3DFF5;padding-left:8px}
.wnav{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border-radius:10px;padding:4px 6px}
.wnav button{background:rgba(255,255,255,.2);border:none;border-radius:7px;width:28px;height:28px;cursor:pointer;font-size:14px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center}
.wnav button:hover:not(:disabled){background:rgba(255,255,255,.35)}
.wnav button:disabled{opacity:.3;cursor:default}
.wnav .wlabel{font-size:13px;font-weight:700;color:#fff;min-width:155px;text-align:center;padding:0 4px}
.main{max-width:1280px;margin:0 auto;padding:1.75rem 1.5rem}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:2rem}
.scard{background:#fff;border-radius:14px;padding:12px 16px;border-bottom:3px solid var(--blue)}
.scard .lbl{font-size:10px;font-weight:700;color:var(--blue-dark);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.scard .val{font-size:20px;font-weight:800;letter-spacing:-.02em}
.wow{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;margin-top:5px;padding:2px 8px;border-radius:20px}
.wow.up{background:var(--green-pale);color:var(--green-dark)}
.wow.down{background:var(--red-pale);color:var(--red-dark)}
.wow.flat{background:var(--g100);color:var(--g500)}
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:5px 14px 5px 10px;border-radius:10px 10px 10px 3px}
.badge.top-v{background:var(--green);color:#fff}
.badge.top-i{background:var(--blue);color:#fff}
.badge.bot-v{background:var(--red);color:#fff}
.badge.bot-i{background:var(--orange);color:#fff}
.sec-sub{font-size:12px;font-weight:600;color:var(--g500)}
.divider{height:2px;background:linear-gradient(to right,#B3DFF5,transparent);margin:1.75rem 0;border-radius:2px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:.5rem}
.card{background:#fff;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:transform .18s,box-shadow .18s;box-shadow:0 2px 6px rgba(41,171,226,.08)}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(41,171,226,.18)}
.card.top-v{border-top:3px solid var(--green)}.card.top-i{border-top:3px solid var(--blue)}
.card.bot-v{border-top:3px solid var(--red)}.card.bot-i{border-top:3px solid var(--orange)}
.pw{position:relative;width:100%;padding-top:177.78%;overflow:hidden;background:#EEF6FB}
.pw iframe{position:absolute;top:50%;left:50%;width:320px;height:525px;border:none;pointer-events:none}
.np{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.np span{font-size:10px;font-weight:700;color:var(--g500)}
.rk{position:absolute;top:7px;left:7px;z-index:2;width:24px;height:24px;border-radius:50% 50% 50% 6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
.rk.top-v{background:var(--green)}.rk.top-i{background:var(--blue)}.rk.bot-v{background:var(--red)}.rk.bot-i{background:var(--orange)}
.tt{position:absolute;top:7px;right:7px;z-index:2;background:rgba(26,46,56,.6);color:#fff;font-size:8px;font-weight:800;letter-spacing:.07em;padding:2px 6px;border-radius:5px;text-transform:uppercase}
.cb{padding:10px;flex:1;display:flex;flex-direction:column;gap:7px}
.an{font-size:11px;font-weight:700;color:var(--g900);line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.am2{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.md{font-size:10px;font-weight:600;color:var(--g500)}
.dp{font-size:9px;font-weight:700;padding:1px 6px;border-radius:20px;background:var(--blue-pale);color:var(--blue-dark)}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.m{border-radius:8px;padding:6px 8px;background:var(--bg);border:1.5px solid var(--g100)}
.ml{font-size:8px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1px}
.mv{font-size:12px;font-weight:800;color:var(--g900)}
.mv.g{color:var(--green-dark)}.mv.r{color:var(--red-dark)}
.aml{display:flex;align-items:center;justify-content:center;gap:4px;font-size:9px;font-weight:700;color:var(--g500);text-decoration:none;padding:4px 0 2px;border-top:1px solid var(--g100);margin-top:auto}
.aml:hover{color:var(--blue)}
.modal-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(13,30,40,.75);align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:20px;display:flex;overflow:hidden;max-height:92vh;width:100%;max-width:820px;position:relative}
.mm{flex-shrink:0;width:300px;background:#1A2E38;display:flex;align-items:center;justify-content:center}
.mm iframe{display:block;border:none;pointer-events:auto;width:300px;height:533px}
.mnp{width:100%;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--g500);font-size:12px;font-weight:700}
.mi{flex:1;padding:1.5rem;overflow-y:auto;display:flex;flex-direction:column;gap:1rem;min-width:0}
.mc{position:absolute;top:14px;right:14px;z-index:10;background:var(--g100);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--g700)}
.mc:hover{color:var(--g900)}
.mb{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:4px 12px;border-radius:8px 8px 8px 2px}
.mt2{font-size:15px;font-weight:800;color:var(--g900);line-height:1.4}
.mdt{font-size:12px;font-weight:600;color:var(--g500)}
.mmg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mme{background:var(--bg);border:1.5px solid var(--g100);border-radius:10px;padding:10px 12px}
.mme .lbl{font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.mme .val{font-size:20px;font-weight:800;color:var(--g900)}
.mme .val.g{color:var(--green-dark)}.mme .val.r{color:var(--red-dark)}
.mam{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--blue);text-decoration:none;padding:8px 14px;border-radius:8px;border:1.5px solid var(--blue-pale);background:var(--blue-pale);margin-top:.5rem}
.mam:hover{background:#d0ecf9}
.footer{text-align:center;margin-top:2.5rem;font-size:11px;font-weight:600;color:var(--g500)}
</style>
</head>

const KEYS=Object.keys(W).sort().reverse();
let idx=0,cur=[];
const TODAY=new Date(2026,5,30);

function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmtW(k){const mon=pd(k),sun=new Date(mon);sun.setDate(mon.getDate()+6);const f=d=>d.toLocaleDateString('es-ES',{day:'2-digit',month:'short'});return`${f(mon)} – ${f(sun)} · ${mon.getFullYear()}`;}
function dA(s){return Math.round((TODAY-pd(s))/86400000);}
function stats(a){const ts=a.reduce((s,x)=>s+x.spend,0),tp=a.reduce((s,x)=>s+x.purchases,0);return{spend:ts,purchases:tp,cpa:tp>0?ts/tp:0,active:a.filter(x=>x.spend>0).length};}
function wow(c,p,lb=false){if(!p||p===0)return'';const pct=((c-p)/p)*100,a=Math.abs(pct).toFixed(1);if(Math.abs(pct)<1)return`<span class="wow flat">→ ${a}%</span>`;const good=lb?pct<0:pct>0;return`<span class="wow ${good?'up':'down'}">${pct>0?'↑':'↓'} ${a}%</span>`;}
function nP(){return`<div class="np"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#7A9AAD" stroke-width="1.5" opacity=".4"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>Sin preview</span></div>`;}
function amA(id){return`<a href="${AM}${id}" target="_blank" rel="noopener" class="aml" onclick="event.stopPropagation()"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Ver en Ads Manager</a>`;}

function card(a,cls,rank,gi){
  const d=dA(a.created),cr=pd(a.created).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
  const sp=`€${a.spend.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const cp=a.cpa>0?`€${a.cpa.toFixed(2)}`:'—',ct=`${a.ctr.toFixed(2)}%`;
  const av=8,cc=a.cpa>0&&a.cpa<=av*0.7?'g':a.cpa>av*1.4?'r':'';
  const src=S[a.id];
  const media=src?`<iframe src="${src}" scrolling="no" allow="autoplay" loading="lazy" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>`:nP();
  return`<div class="card ${cls}" onclick="oM(${gi})">
  <div class="pw">${media}<span class="rk ${cls}">${rank}</span><span class="tt">${a.type}</span></div>
  <div class="cb">
    <p class="an" title="${a.name}">${a.name}</p>
    <div class="am2"><span class="md">${cr}</span><span class="dp">${d}d</span></div>
    <div class="mg">
      <div class="m"><div class="ml">Spend</div><div class="mv">${sp}</div></div>
      <div class="m"><div class="ml">Purchases</div><div class="mv">${a.purchases}</div></div>
      <div class="m"><div class="ml">CPA</div><div class="mv ${cc}">${cp}</div></div>
      <div class="m"><div class="ml">CTR</div><div class="mv">${ct}</div></div>
    </div>
    ${amA(a.id)}
  </div>
</div>`;}

function sec(ads,all,cls,emo,lbl,sub){if(!ads.length)return'';return`<div class="sec-hdr"><span class="badge ${cls}">${emo} ${lbl}</span><span class="sec-sub">${sub}</span></div><div class="grid5">${ads.map((a,i)=>card(a,cls,i+1,all.indexOf(a))).join('')}</div>`;}
function scale(){document.querySelectorAll('.pw').forEach(w=>{const W=w.offsetWidth;if(!W)return;const f=w.querySelector('iframe');if(f)f.style.transform=`translate(-50%,-50%) scale(${W/320})`;});}

function render(){
  const key=KEYS[idx];
  document.getElementById('wl').textContent=fmtW(key);
  document.getElementById('bp').disabled=idx>=KEYS.length-1;
  document.getElementById('bn').disabled=idx<=0;
  const ads=W[key]||[];cur=ads;
  const prev=KEYS[idx+1]?W[KEYS[idx+1]]:null;
  const c=stats(ads),p=prev?stats(prev):null;
  const fe=`€${c.spend.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const vids=ads.filter(a=>a.type==='VID').sort((a,b)=>b.purchases-a.purchases);
  const imgs=ads.filter(a=>a.type==='IMG'||a.type==='IMA').sort((a,b)=>b.purchases-a.purchases);
  const tv=vids.slice(0,5),bv=vids.length>5?[...vids].slice(-5).reverse():[];
  const ti=imgs.slice(0,5),bi=imgs.length>5?[...imgs].slice(-5).reverse():[];
  document.getElementById('main').innerHTML=`
    <div class="summary">
      <div class="scard"><div class="lbl">Total spend</div><div class="val">${fe}</div>${p?wow(c.spend,p.spend):''}</div>
      <div class="scard"><div class="lbl">Total purchases</div><div class="val">${c.purchases}</div>${p?wow(c.purchases,p.purchases):''}</div>
      <div class="scard"><div class="lbl">CPA medio</div><div class="val">${c.cpa>0?`€${c.cpa.toFixed(2)}`:'—'}</div>${p&&p.cpa>0?wow(c.cpa,p.cpa,true):''}</div>
      <div class="scard"><div class="lbl">Creatividades activas</div><div class="val">${c.active}</div>${p?wow(c.active,p.active):''}</div>
    </div>
    ${sec(tv,ads,'top-v','🏆','Top 5 Video','Mayor purchases')}
    <div class="divider"></div>
    ${sec(ti,ads,'top-i','🏆','Top 5 Imagen','Mayor purchases')}
    ${bv.length?'<div class="divider"></div>'+sec(bv,ads,'bot-v','⚠️','Bottom 5 Video','Menor purchases'):''}
    ${bi.length?'<div class="divider"></div>'+sec(bi,ads,'bot-i','⚠️','Bottom 5 Imagen','Menor purchases'):''}`;
  requestAnimationFrame(()=>requestAnimationFrame(scale));
}

function oM(i){
  const a=cur[i];if(!a)return;
  const d=dA(a.created),cr=pd(a.created).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'});
  const sp=`€${a.spend.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const cp=a.cpa>0?`€${a.cpa.toFixed(2)}`:'—',ct=`${a.ctr.toFixed(2)}%`;
  const av=8,cc=a.cpa>0&&a.cpa<=av*0.7?'g':a.cpa>av*1.4?'r':'';
  const src=S[a.id];
  document.getElementById('mm').innerHTML=src
    ?`<iframe src="${src}" scrolling="yes" allow="autoplay" sandbox="allow-scripts allow-same-origin allow-popups" style="width:300px;height:533px;border:none;pointer-events:auto"></iframe>`
    :`<div class="mnp"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#7A9AAD" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><span>Sin preview disponible</span></div>`;
  document.getElementById('mi').innerHTML=`
    <div><span class="mb" style="background:${a.type==='VID'?'#29ABE2':'#8CC63F'};color:#fff">${a.type} · ${d}d activo</span></div>
    <p class="mt2">${a.name}</p><p class="mdt">📅 Creado: ${cr}</p>
    <div class="mmg">
      <div class="mme"><div class="lbl">Ad Spend</div><div class="val">${sp}</div></div>
      <div class="mme"><div class="lbl">Purchases</div><div class="val">${a.purchases}</div></div>
      <div class="mme"><div class="lbl">CPA</div><div class="val ${cc}">${cp}</div></div>
      <div class="mme"><div class="lbl">CTR</div><div class="val">${ct}</div></div>
    </div>
    <a href="${AM}${a.id}" target="_blank" rel="noopener" class="mam"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Ver en Ads Manager</a>`;
  document.getElementById('mo').classList.add('open');
}
function cM(){document.getElementById('mo').classList.remove('open');const f=document.querySelector('#mm iframe');if(f){const s=f.src;f.src='';f.src=s;}}
document.getElementById('mc').addEventListener('click',cM);
document.getElementById('mo').addEventListener('click',e=>{if(e.target===e.currentTarget)cM();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')cM();});
document.getElementById('bp').addEventListener('click',()=>{if(idx<KEYS.length-1){idx++;render();}});
document.getElementById('bn').addEventListener('click',()=>{if(idx>0){idx--;render();}});
window.addEventListener('resize',scale);
render();
</script>
</body>
